# =============================================================================
# Конфиг сканера токенов с Telegram-уведомлениями
# =============================================================================
# Этот бот ТОЛЬКО слушает новые токены и отправляет алерты в Telegram.
# Он НЕ покупает и НЕ продаёт — никаких транзакций, приватный ключ НЕ нужен.
#
# Запуск:
#   uv run src/scanner_runner.py
#   uv run src/scanner_runner.py bots/bot-scanner-telegram.yaml
# =============================================================================

# Имя сканера (используется в логах и именах лог-файлов)
name: "scanner-telegram"

# Файл с секретными переменными (токен Telegram, RPC-ключи и т.д.)
env_file: ".env"

# Включить/выключить сканер без удаления файла
enabled: true

# Платформа для слежки:
#   "pump_fun"   — pump.fun
#   "lets_bonk"  — letsbonk.fun
platform: "pump_fun"


# =============================================================================
# Telegram уведомления
# =============================================================================
# Значения можно указать здесь ИЛИ добавить в файл .env
# Рекомендуется хранить в .env, чтобы не попасть в git

telegram:
  # Токен бота от @BotFather — читается из .env файла
  bot_token: "${TELEGRAM_BOT_TOKEN}"

  # ID чата или канала — читается из .env файла
  # Для личных сообщений: твой user ID (например 123456789)
  # Для группы: отрицательное число (-1001234567890)
  chat_id: "${TELEGRAM_CHAT_ID}"


# =============================================================================
# Метод прослушивания новых токенов
# =============================================================================
# "pumpportal" — РЕКОМЕНДУЕТСЯ для старта:
#               Подключается к wss://pumpportal.fun/api/data
#               Полностью бесплатно, не нужен свой RPC-узел
#               Минус: зависишь от стороннего сервиса pump.fun
#
# "logs"       — Подключается напрямую к Solana через WebSocket
#               Нужен wss_endpoint (Chainstack / Helius бесплатный тариф)
#               Надёжнее, чем pumpportal
#
# "blocks"     — Самый быстрый метод (blockSubscribe)
#               Нужен wss_endpoint с поддержкой blockSubscribe
#               ⚠️ Может быть недоступен на бесплатном тарифе!
#               Платный тариф Chainstack или Helius Growth (~$50/мес)
#
listener_type: "logs"


# =============================================================================
# RPC-эндпоинты (нужны только если listener_type = "logs" или "blocks")
# =============================================================================
# Для "pumpportal" — эти поля можно оставить пустыми
#
# Бесплатные варианты:
#   Chainstack: https://chainstack.com  → бесплатный тариф даёт WSS
#   Helius:     https://helius.dev      → бесплатный тариф даёт WSS
#
rpc_endpoint: "${SOLANA_NODE_RPC_ENDPOINT}"
wss_endpoint: "${SOLANA_NODE_WSS_ENDPOINT}"


# =============================================================================
# Фильтры токенов (необязательно)
# =============================================================================
filters:
  # Фильтровать по названию или символу токена (без учёта регистра)
  # Примеры: "pepe", "doge", "sol"
  # null = получать ВСЕ токены
  match_string: null

  # Фильтровать по адресу кошелька разработчика
  # Полезно если хочешь следить за конкретным "бро"
  # null = не фильтровать
  creator_address: null
